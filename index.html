<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel-Blog</title>

  <link rel="stylesheet" href="./styles/standard.css">
  <link rel="stylesheet" href="./styles/font.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section>
    <header class="header"></header>
    <div class="landing-section"></div>
  </section>
  <main>
    <div class="some-headline"></div>
    <div class="faq">
      <div class="faq-headline">
        <img src="./assets/icons/live_help.png" alt="Icon live-help">
        <h1>FAQ</h1>
      </div>
    </div>
    <section class="contact-form">
      <div class="contact-form-head">
        <div class="contact-form-headline">
          <img src="./assets/icons/person_pin.png" alt="Icon person-pin">
          <h1>Contact form</h1>
        </div>
        <p>Have a question or an idea to collaborate?</p>
        <p>Get in touch—I'd love to hear from you and explore how we can work together.</p>
      </div>

      <form class="contact-form-input" action="">
        <div class="cfi-row-2element">
          <div class="cfi-container-small">
            <label for="cfi-name">What's your name?</label><br>
            <input type="text" id="cfi-name" name="cfi-name">
          </div>
          <div class="cfi-container-small">
            <label for="cfi-email">What's your email?</label><br>
            <input type="text" id="cfi-email" name="cfi-email">
          </div>
        </div>
        <div class="cfi-row-1element">
          <div class="cfi-container-large">
            <label for="cfi-question">How can I help?</label><br>
            <input type="text" id="cfi-question" name="cfi-question">
          </div>
        </div>
        <div class="cfi-send">
          <div class="cfi-check">
            <input type="checkbox" id="cfi-check" name="cfi-check">
            <p>I've read the <a href="privacy policy.html" target="_blank">privacy policy</a> and agree to the
              processing
              of my data as
              outlined.</p>
          </div>

          <button type="submit" value="Send">Send</button>
        </div>
      </form>


    </section>
  </main>
  <footer class="foot">
    <div class="foot-content">
      <div class="foot-content-left">
        <div class="foot-content-left-copyright">
          <img src="./assets/icons/copyright.png" alt="copyright_icon">
          <p>Travel Blog 2026</p>
        </div>
        <a href="">Imprint</a>
        <a href="">Cookie Preferences</a>
      </div>
      <div class="foot-content-right">
        <a href="https://www.tiktok.com/" target="_blank"><img src="./assets/icons/Tiktok_icon 1.png"
            alt="Tiktok_icon"></a>
        <a href="https://www.youtube.com/" target="_blank"><img src="./assets/icons/youtube.png" alt="Youtube_icon"></a>
        <a href="https://www.facebook.com/?locale=de_DE" target="_blank"><img src="./assets/icons/facebook.png"
            alt="Facebook.icon"></a>
        <a href="https://www.instagram.com/" target="_blank"><img src="./assets/icons/Instagram_logo_2016 1.png"
            alt="instagram-icon"></a>
      </div>
    </div>
  </footer>
</body>

</html>
